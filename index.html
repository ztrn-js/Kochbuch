  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Meine Rezepte</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream:  #f5efe6;
      --linen:  #ede3d6;
      --brown:  #3b2a1a;
      --terra:  #c0622a;
      --muted:  #8a7060;
      --overlay: rgba(30, 18, 8, 0.88);
      --radius: 4px;
      --gap:    20px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--cream);
      color: var(--brown);
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      min-height: 100vh;
    }


    header {
      text-align: center;
      padding: 56px 24px 40px;
      border-bottom: 1px solid var(--linen);
    }
    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.4rem, 6vw, 4rem);
      font-weight: 400;
      letter-spacing: 0.02em;
    }
    header h1 em { font-style: italic; color: var(--terra); }
    header p {
      margin-top: 10px;
      font-size: 0.85rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }


    main {
      max-width: 1120px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }
    .rule {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 40px;
      color: var(--muted);
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }
    .rule::before, .rule::after {
      content: ''; flex: 1; height: 1px; background: var(--linen);
    }


    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: var(--gap);
    }


    .card {
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 10px;
      animation: fadeUp 0.5s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card-img-wrap {
      width: 100%;
      aspect-ratio: 1 / 1;
      overflow: hidden;
      background: var(--linen);
      border-radius: var(--radius);
    }
    .card-img-wrap img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
      transition: transform 0.45s ease, filter 0.45s ease;
    }
    .card:hover .card-img-wrap img { transform: scale(1.06); filter: brightness(0.88); }
    .card-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem; font-weight: 400;
      color: var(--brown); line-height: 1.3; padding: 0 2px;
      transition: color 0.2s;
    }
    .card:hover .card-name { color: var(--terra); }


    #status {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px 0;
      color: var(--muted);
    }
    #status p:first-child {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem; font-style: italic; margin-bottom: 8px;
    }
    #status p { font-size: 0.85rem; line-height: 1.8; }
    #status code {
      background: var(--linen);
      padding: 1px 6px;
      border-radius: 3px;
      font-size: 0.82rem;
    }

    #modal {
      display: none;
      position: fixed; inset: 0;
      background: var(--overlay);
      z-index: 100;
      align-items: center; justify-content: center;
      padding: 0;
      animation: fadeIn 0.25s ease;
    }
    #modal.open { display: flex; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    #modal-inner {
      position: relative;
      width: 100vw;    /* change-whole screen */
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: scaleIn 0.28s cubic-bezier(0.34,1.4,0.64,1) both;
    }
    @keyframes scaleIn {
      from { transform: scale(0.92); opacity: 0; }
      to   { transform: scale(1);    opacity: 1; }
    }

    #modal-title {
      position: absolute;
      top: 20px;
      left: 24px;
      z-index: 10;
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.4rem, 3vw, 2rem);
      font-weight: 400;
      color: #f5efe6;
      margin: 0;
      text-shadow: 0 2px 6px rgba(0,0,0,0.8);
    }

    #modal-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      background: #1e1208;
    }

    #modal-close {
      position: absolute;
      top: 20px;
      right: 24px;
      z-index: 10;
      width: 38px; height: 38px; border-radius: 50%;
      background: var(--terra); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 1.1rem;
      transition: background 0.2s, transform 0.2s;
    }
    #modal-close:hover { background: #a34f1e; transform: scale(1.1); }

  </style>
</head>
<body>

<header>
  <h1>Kochbuch?</h1>          <!-- <h1>Meine <em>Rezepte</em></h1>  -->
  <p>Pseminar idk</p>
</header>

<main>
  <div class="rule">Gerichte</div>
  <div id="grid">
    <div id="status"><p>Lade Rezepte …</p></div>
  </div>
</main>

<div id="modal" role="dialog" aria-modal="true">
  <div id="modal-inner">
    <button id="modal-close" aria-label="Schließen">✕</button>
    <p id="modal-title"></p>
    <img id="modal-img" src="" alt="" />
  </div>
</div>

<script>
  const GITHUB_USER = "ztrn-js";
  const GITHUB_REPO = "Kochbuch";

  const BILD_EXTENSIONS = ['jpg', 'jpeg', 'png', 'webp'];

  const grid   = document.getElementById('grid');
  const status = document.getElementById('status');
  const modal  = document.getElementById('modal');
  const mTitle = document.getElementById('modal-title');
  const mImg   = document.getElementById('modal-img');
  const mClose = document.getElementById('modal-close');

  // Dateiname → lesbarer Anzeigename
  // "kaesespaetzle" → "Kaesespaetzle"
  // "kaese-spaetzle" oder "kaese_spaetzle" → "Kaese Spaetzle"
  function toDisplayName(filename) {
    return filename
      .replace(/[-_]/g, ' ')
      .replace(/\b\w/g, c => c.toUpperCase());
  }

  async function loadRecipes() {
    const apiUrl = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/thumbnails`;

    try {
      const res = await fetch(apiUrl);

      if (!res.ok) {
        if (res.status === 404) throw new Error('not_found');
        throw new Error('api_error');
      }

      const files = await res.json();

      const recipes = files
        .filter(f => BILD_EXTENSIONS.some(ext => f.name.toLowerCase().endsWith('.' + ext)))
        .map(f => {
          const base = f.name.replace(/\.[^.]+$/, '');
          return { base, name: toDisplayName(base) };
        });

      if (recipes.length === 0) {
        showStatus('Noch keine Rezepte', 'Bilder in Ordner <code>thumbnails/</code> hochladen');
      } else {
        render(recipes);
      }

    } catch (e) {
      if (e.message === 'not_found') {
        showStatus(
          'Repository not found',
          `Bitte <code>GITHUB_USER</code> und <code>GITHUB_REPO</code> oben in der <code>index.html</code> anpassen.<br>
           Außerdem muss der Ordner <code>thumbnails/</code> im Repository vorhanden sein.`
        );
      } else {
        showStatus(
          'Fehler beim Laden',
        );
      }
    }
  }

  function showStatus(title, msg) {
    status.style.display = 'block';
    status.innerHTML = `<p>${title}</p><p>${msg}</p>`;
  }

  function render(recipes) {
    status.style.display = 'none';
    grid.querySelectorAll('.card').forEach(c => c.remove());

    recipes.forEach((r, i) => {
      // .endung
      const card = document.createElement('div');
      card.className = 'card';
      card.style.animationDelay = (i * 0.05) + 's';
      card.innerHTML = `
        <div class="card-img-wrap">
          <img src="thumbnails/${r.base}.jpg"
               onerror="tryNextExt(this, '${r.base}', 0)"
               alt="${r.name}" loading="lazy" />
        </div>
        <div class="card-name">${r.name}</div>
      `;
      card.addEventListener('click', () => openModal(r));
      grid.appendChild(card);
    });
  }

  // Fallback .end
  const EXTS = ['jpeg', 'png', 'webp'];
  window.tryNextExt = function(img, base, idx) {
    if (idx < EXTS.length) {
      img.onerror = () => tryNextExt(img, base, idx + 1);
      img.src = `thumbnails/${base}.${EXTS[idx]}`;
    } else {
      img.onerror = null;
      img.style.opacity = '0.3';
    }
  };

  function openModal(r) {
    mTitle.textContent = r.name;
    mImg.src = `rezepte/${r.base}-r.jpg`;
    mImg.onerror = () => tryNextExtModal(mImg, r.base, 0);
    mImg.alt = r.name + ' – Rezept';
    modal.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  window.tryNextExtModal = function(img, base, idx) {
    if (idx < EXTS.length) {
      img.onerror = () => tryNextExtModal(img, base, idx + 1);
      img.src = `rezepte/${base}-r.${EXTS[idx]}`;
    } else {
      img.onerror = null;
    }
  };

  function closeModal() {
    modal.classList.remove('open');
    document.body.style.overflow = '';
    mImg.src = '';
  }

  mClose.addEventListener('click', closeModal);
  modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  loadRecipes();
</script>
</body>
</html>
